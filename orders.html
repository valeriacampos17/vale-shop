<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Vale-Shop - Carrito</title>
  <meta name="description"
    content="Vale-Shop es un ecommerce moderno que ofrece una amplia variedad de productos de moda, incluyendo ropa de mujer, ropa de hombre y accesorios. Disfruta de una experiencia de compra fluida y fácil con nuestra PWA.">
  <link rel="apple-touch-icon" href="assets/icons/icon-180x180.png">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/orders.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header>
    <h1>Vale-Shop</h1>
    <a href="orders.html#favorites-section" id="like-button" aria-label="Favoritos">
      <i class="fa-solid fa-heart"></i>
    </a>
    <button id="theme-toggle" aria-label="Cambiar modo">
      <i class="fa-solid fa-sun"></i>
    </button>
  </header>

  <main>
    <section class="product-list">
      <h1>Carrito</h1>
      <div class="item-list"></div>
      <button id="buy-button" class="fix-button-buy">
        <i class="fa-solid fa-bag-shopping"></i> COMPRAR $0.00
      </button>
    </section>

    <section id="favorites-section" class="favorites-section">
      <h1>
        <i class="fa-solid fa-heart"></i>
        Favoritos
      </h1>
      <div class="item-list-flex"></div>
    </section>

    <div id="orders-modal" class="modal fix-modal">
      <div class="modal-content">
        <span class="close" onclick="closeOrdersModal()">
          <i class="fa-solid fa-xmark"></i>
        </span>
        <h2>Ingrese sus Datos</h2>
        <form id="user-info-form">
          <label for="name">Nombre:</label>
          <input type="text" id="name" name="name" placeholder="Ingresa tu nombre" required>

          <label for="phone">Teléfono:</label>
          <input type="tel" id="phone" name="phone" placeholder="Ingresa tu número de teléfono" required>

          <label for="gender">Sexo:</label>
          <select id="gender" name="gender" required>
            <option value="">Selecciona</option>
            <option value="male">Masculino</option>
            <option value="female">Femenino</option>
            <option value="other">Otro</option>
          </select>

          <button id="btn-submit" class="fix-button-buy" type="submit">
            <i class="fa-solid fa-paper-plane"></i> Enviar
          </button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </a>
      <a href="products.html" class="nav-item">
        <i class="fa-solid fa-box"></i>
        <span>Productos</span>
      </a>
      <a href="orders.html" class="nav-item">
        <i class="fas fa-shopping-bag"></i>
        <span>Pedidos</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Configuración</span>
      </a>
    </nav>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/orders.js"></script>
  <script src="assets/js/cart-highlight.js"></script>

  <script type="module">
    import { createOrder } from './assets/js/firebase.js';

    document.addEventListener('DOMContentLoaded', function () {
      renderProductsOrders();
      renderFavorites();
    });

    const userInfoForm = document.getElementById('user-info-form');
    if (userInfoForm) {
      userInfoForm.addEventListener('submit', (e) => {
        e.preventDefault();

        var newOrder = new Object();
        newOrder.name = userInfoForm['name'].value;
        newOrder.phone = userInfoForm['phone'].value;
        newOrder.gender = userInfoForm['gender'].value;
        newOrder.cart = JSON.parse(sessionStorage.getItem('cart')) || [];

        createOrder(newOrder);
        closeOrdersModal();

        // Mostrar notificación de éxito
        const notification = document.createElement('div');
        notification.className = 'cart-notification';
        notification.innerHTML = `
          <i class="fa-solid fa-check-circle"></i>
          <span>¡Pedido realizado con éxito!</span>
        `;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.style.animation = 'fadeOut 0.3s ease';
          setTimeout(() => {
            if (document.body.contains(notification)) {
              document.body.removeChild(notification);
            }
          }, 300);
        }, 2000);
      });
    }
  </script>
</body>

</html>
