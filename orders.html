<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Meta tags específicos para PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vale-Shop">
  <meta name="theme-color" content="#0f1a1d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Vale-Shop">

  <title>Vale-Shop - Carrito</title>
  <meta name="description"
    content="Vale-Shop es un ecommerce moderno que ofrece una amplia variedad de productos de moda, incluyendo ropa de mujer, ropa de hombre y accesorios. Disfruta de una experiencia de compra fluida y fácil con nuestra PWA.">

  <!-- Manifest y favicons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512x512.png">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/orders.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header>
    <h1>Vale-Shop</h1>
    <a href="orders.html#favorites-section" id="like-button" aria-label="Favoritos">
      <i class="fa-solid fa-heart"></i>
    </a>
    <button id="theme-toggle" aria-label="Cambiar modo">
      <i class="fa-solid fa-sun"></i>
    </button>
  </header>

  <main>
    <!-- Sección del carrito con nuevo encabezado -->
    <section class="product-list">
      <div class="page-header">
        <button class="back-button" onclick="window.history.back()" aria-label="Volver">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h1 class="page-title">Mi Carrito</h1>
        <div class="right-placeholder"></div>
      </div>
      <div class="item-list"></div>
      <button id="buy-button" class="fix-button-buy" style="display: none;">
        <i class="fa-solid fa-bag-shopping"></i> COMPRAR $0.00
      </button>
    </section>

    <!-- Sección de favoritos -->
    <section id="favorites-section" class="favorites-section">
      <div class="page-header centered">
        <h2 class="page-title">
          <i class="fa-solid fa-heart" style="color: #ff4444; margin-right: 8px;"></i>
          Mis Favoritos
        </h2>
      </div>
      <div class="item-list-flex"></div>
    </section>

    <!-- Modal de Checkout de 3 pasos -->
    <div id="orders-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeOrdersModal()">
          <i class="fa-solid fa-xmark"></i>
        </span>

        <!-- Barra de progreso fija en la parte superior -->
        <div id="checkout-progress" class="checkout-progress"></div>

        <!-- Contenedor scrolleable para el contenido -->
        <div id="checkout-container" class="checkout-container"></div>

        <!-- Contenedor fijo para los botones de acción -->
        <div id="checkout-actions" class="checkout-actions"></div>
      </div>
    </div>

    <!-- Modal para nueva dirección -->
    <div id="address-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAddressModal()">
          <i class="fa-solid fa-xmark"></i>
        </span>
        <div class="address-modal-content">
          <h2 class="section-title">Nueva Dirección</h2>
          <form id="address-form" onsubmit="saveAddress(event)">
            <label for="fullname">Nombre completo:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Ej: Juan Pérez" required>

            <label for="address">Dirección:</label>
            <textarea id="address" name="address" placeholder="Calle, número, edificio" required></textarea>

            <label for="city">Ciudad:</label>
            <input type="text" id="city" name="city" placeholder="Ciudad" required>

            <label for="state">Estado:</label>
            <select id="state" name="state" required>
              <option value="">Selecciona un estado</option>
              <option value="Amazonas">Amazonas</option>
              <option value="Anzoátegui">Anzoátegui</option>
              <option value="Apure">Apure</option>
              <option value="Aragua">Aragua</option>
              <option value="Barinas">Barinas</option>
              <option value="Bolívar">Bolívar</option>
              <option value="Carabobo">Carabobo</option>
              <option value="Cojedes">Cojedes</option>
              <option value="Delta Amacuro">Delta Amacuro</option>
              <option value="Distrito Capital">Distrito Capital</option>
              <option value="Falcón">Falcón</option>
              <option value="Guárico">Guárico</option>
              <option value="Lara">Lara</option>
              <option value="Mérida">Mérida</option>
              <option value="Miranda">Miranda</option>
              <option value="Monagas">Monagas</option>
              <option value="Nueva Esparta">Nueva Esparta</option>
              <option value="Portuguesa">Portuguesa</option>
              <option value="Sucre">Sucre</option>
              <option value="Táchira">Táchira</option>
              <option value="Trujillo">Trujillo</option>
              <option value="La Guaira">La Guaira</option>
              <option value="Yaracuy">Yaracuy</option>
              <option value="Zulia">Zulia</option>
            </select>

            <label for="zipcode">Código Postal:</label>
            <input type="text" id="zipcode" name="zipcode" placeholder="Código Postal" required>

            <button type="submit" class="fix-button-buy" style="margin-top: 20px;">
              <i class="fa-solid fa-save"></i> Guardar Dirección
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </a>
      <a href="products.html" class="nav-item">
        <i class="fa-solid fa-box"></i>
        <span>Productos</span>
      </a>
      <a href="orders.html" class="nav-item active">
        <i class="fas fa-shopping-bag"></i>
        <span>Pedidos</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Ajustes</span>
      </a>
    </nav>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/cart-utils.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/orders.js"></script>
  <script src="assets/js/cart-highlight.js"></script>
</body>

</html>
