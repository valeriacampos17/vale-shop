<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Meta tags específicos para PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vale-Shop">
    <meta name="theme-color" content="#0f1a1d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Vale-Shop">

    <title>Vale-Shop - Productos</title>
    <meta name="description"
        content="Vale-Shop es un ecommerce moderno que ofrece una amplia variedad de productos de moda, incluyendo ropa de mujer, ropa de hombre y accesorios. Disfruta de una experiencia de compra fluida y fácil con nuestra PWA.">

    <!-- Manifest y favicons -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512x512.png">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <button id="menu-toggle" aria-label="Menú" class="hamburger-menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1>Vale-Shop</h1>
        <a href="orders.html#favorites-section" id="like-button" aria-label="Me gusta">
            <i class="fa-solid fa-heart"></i>
        </a>
        <button id="theme-toggle" aria-label="Cambiar modo">
            <i class="fa-solid fa-sun"></i>
        </button>
        <nav id="mobile-menu" class="mobile-menu">
            <ul>
                <li><a href="#" data-category="1">Ropa de Mujer</a></li>
                <li><a href="#" data-category="2">Ropa de Hombre</a></li>
                <li><a href="#" data-category="3">Accesorios</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="product-list">
            <div class="page-header">
                <button class="back-button" onclick="window.history.back()" aria-label="Volver">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h1 class="page-title">Lista de Productos</h1>
                <div class="right-placeholder"></div>
            </div>
            <div class="tags-container">
                <div id="tag-mujer" class="tag">
                    <span class="text">Ropa de Mujer</span>
                    <span class="icon">x</span>
                </div>
                <div id="tag-hombre" class="tag">
                    <span class="text">Ropa de Hombre</span>
                    <span class="icon">x</span>
                </div>
                <div id="tag-accesorio" class="tag">
                    <span class="text">Accesorios</span>
                    <span class="icon">x</span>
                </div>
            </div>
            <div class="product-grid">
                <!-- Los productos se renderizarán dinámicamente -->
            </div>
        </section>

        <div id="hearts-container"></div>

        <div id="product-modal" class="modal">
            <div class="modal-content">
                <!-- El contenido del modal se genera dinámicamente -->
            </div>
        </div>

    </main>

    <footer>
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Inicio</span>
            </a>
            <a href="products.html" class="nav-item active">
                <i class="fa-solid fa-box"></i>
                <span>Productos</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Pedidos</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Ajustes</span>
            </a>
        </nav>
    </footer>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart-utils.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/modal.js"></script>
    <script src="assets/js/hearts.js"></script>
    <script src="assets/js/cart-highlight.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('category');
        const tags = {
            mujer: document.getElementById('tag-mujer'),
            hombre: document.getElementById('tag-hombre'),
            accesorio: document.getElementById('tag-accesorio')
        };

        function hideAllTags() {
            Object.values(tags).forEach(tag => tag.style.display = 'none');
        }

        function selectCategory(categoryId) {
            hideAllTags();
            switch (categoryId) {
                case '1':
                    tags.mujer.style.display = 'block';
                    break;
                case '2':
                    tags.hombre.style.display = 'block';
                    break;
                case '3':
                    tags.accesorio.style.display = 'block';
                    break;
                default:
                    Object.values(tags).forEach(tag => tag.style.display = 'block');
            }
        }

        hideAllTags();
        let products = categoryId ? getProductByCategoryId(categoryId) : JSON.parse(sessionStorage.getItem('productsJson'));
        if (categoryId) { selectCategory(categoryId) }
        renderProductsGrid(products);

        document.querySelectorAll('.icon').forEach(icon => {
            icon.addEventListener('click', function () {
                this.parentElement.style.display = 'none';
                products = JSON.parse(sessionStorage.getItem('productsJson'));
                renderProductsGrid(products);
            });
        });

        document.getElementById('menu-toggle').addEventListener('click', function () {
            document.getElementById('mobile-menu').style.display = document.getElementById('mobile-menu').style.display === 'block' ? 'none' : 'block';
        });

        document.querySelectorAll('#mobile-menu a').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const categoryId = this.getAttribute('data-category');
                selectCategory(categoryId);
                products = getProductByCategoryId(categoryId);
                renderProductsGrid(products);
                document.getElementById('mobile-menu').style.display = 'none';
            });
        });
    </script>
</body>

</html>
