<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>Vale-Shop - Registrarse</title>
    <meta name="description" content="Regístrate en Vale-Shop para disfrutar de una experiencia de compra única.">
    <link rel="stylesheet" href="assets/css/auth.css"> <!-- Cambiado -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/png" href="assets/icons/icon-120x120.png">
</head>

<body>
    <div class="auth-header">
        <a href="javascript:history.back()">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Volver</span>
        </a>
        <button id="theme-toggle" class="auth-theme-toggle" aria-label="Cambiar modo">
            <i class="fa-solid fa-sun"></i>
        </button>
    </div>

    <div class="container">
        <div class="login-box">
            <h2>Crear Cuenta</h2>
            <form id="signup-form" autocomplete="off">
                <div class="input-container">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej: Juan Pérez" required>
                </div>
                
                <div class="input-container">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com">
                </div>
                
                <div class="input-container">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" name="phone" placeholder="+56 9 1234 5678">
                </div>
                
                <p id="contact-error" style="color: #f44336; display: none; margin-bottom: 10px; font-size: 14px;">
                    <i class="fa-solid fa-circle-exclamation"></i> Debes proporcionar al menos un correo o un teléfono
                </p>
                
                <div class="input-container">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="input-container">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                </div>
                
                <p id="password-error" style="color: #f44336; display: none; margin-bottom: 10px; font-size: 14px;">
                    <i class="fa-solid fa-circle-exclamation"></i> Las contraseñas no coinciden
                </p>
                
                <button type="submit" class="btn" id="submit-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    <span class="btn-text">Registrarse</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </span>
                </button>
            </form>
            
            <p class="register-link">¿Ya tienes una cuenta? <a href="signin.html">Inicia sesión</a></p>
        </div>
    </div>

    <script type="module" src="assets/js/signup.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
