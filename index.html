<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
  <!-- Meta tags específicos para PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vale-Shop">
  <meta name="theme-color" content="#0f1a1d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Vale-Shop">

  <title>Vale-Shop - Inicio</title>
  <meta name="description"
    content="Vale-Shop es un ecommerce moderno que ofrece una amplia variedad de productos de moda, incluyendo ropa de mujer, ropa de hombre y accesorios. Disfruta de una experiencia de compra fluida y fácil con nuestra PWA.">

  <!-- Manifest y favicons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512x512.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header>
    <h1>Vale-Shop</h1>
    <a href="orders.html#favorites-section" id="like-button" aria-label="Me gusta">
      <i class="fa-solid fa-heart"></i>
    </a>
    <button id="theme-toggle" aria-label="Cambiar modo">
      <i class="fa-solid fa-sun"></i>
    </button>
  </header>

  <main>
    <section class="carousel-container">
      <button class="carousel-button prev" onclick="moveSlide(-1)">
        <i class="fa-solid fa-solid fa-chevron-left"></i>
      </button>
      <div class="carousel">
        <div class="product-container">
          <div class="product skeleton">
            <div class="img-product"></div>
            <div class="info-container">
              <div class="info">
                <h2></h2>
                <p></p>
              </div>
              <div class="cart">
                <div class="cart-circle"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="carousel-button next" onclick="moveSlide(1)">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </section>

    <section class="categories-container">
      <div class="categories">
        <a href="products.html?category=1" class="category">
          <h1>Ropa de Mujer</h1>
        </a>
        <a href="products.html?category=2" class="category">
          <h1>Ropa de Hombre</h1>
        </a>
        <a href="products.html?category=3" class="category">
          <h1>Accesorios</h1>
        </a>
      </div>
    </section>

    <section class="image-footer">
      <img src="assets/image/footer.png" alt="">
    </section>

    <div id="hearts-container"></div>

    <div id="product-modal" class="modal">
      <div class="modal-content"></div>
    </div>
  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </a>
      <a href="products.html" class="nav-item">
        <i class="fa-solid fa-box"></i>
        <span>Productos</span>
      </a>
      <a href="orders.html" class="nav-item">
        <i class="fas fa-shopping-bag"></i>
        <span>Pedidos</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Ajustes</span>
      </a>
    </nav>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/orders.js"></script>
  <script src="assets/js/hearts.js"></script>
  <script src="assets/js/cart-highlight.js"></script>

  <script type="module">
    import { getInitToken } from './assets/js/firebase.js';

    // Registro de Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("service-worker.js")
          .then((registration) => {
            console.log("SW registrado:", registration);
            getInitToken(registration);
          })
          .catch((err) => console.log("Error SW:", err));
      });
    }
  </script>

  <script>
    // Variable global para el índice del carrusel
    let slideIndex = 0;

    // Iniciar la carga de productos cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', function () {
      // Verificar si getAllProduct está definida
      if (typeof getAllProduct === 'function') {
        // Pequeño retraso para asegurar que el skeleton se vea
        setTimeout(() => {
          getAllProduct();
        }, 100);
      } else {
        console.error('getAllProduct no está definida');
      }
    });

    function moveSlide(step) {
      const slides = document.querySelector(".product-container");
      if (!slides || !slides.children.length) return;

      const slideWidth = slides.children[0].offsetWidth;
      const maxIndex = slides.children.length - 1;

      // Calcular el nuevo índice
      let newIndex = slideIndex + step;

      // Limitar el índice entre 0 y maxIndex
      if (newIndex < 0) newIndex = 0; if (newIndex > maxIndex) newIndex = maxIndex;

      // Aplicar la transformación
      slideIndex = newIndex;
      slides.style.transform = `translateX(-${slideIndex * slideWidth}px)`;
    }

    // Recalcular en caso de cambio de tamaño de ventana
    window.addEventListener('resize', function () {
      const slides = document.querySelector(".product-container");
      if (slides && slides.children.length > 0) {
        // Resetear transformación
        slides.style.transform = 'translateX(0px)';
        slideIndex = 0;

        // Recalcular el ancho y aplicar si hay más de un slide
        if (slides.children.length > 1) {
          const slideWidth = slides.children[0].offsetWidth;
          slides.style.transform = `translateX(-${slideIndex * slideWidth}px)`;
        }
      }
    });
  </script>
</body>

</html>
