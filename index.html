<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags específicos para iOS (se mantienen para compatibilidad nativa) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Vale-Shop">
  
  <title>Vale-Shop</title>
  <meta name="description"
    content="Vale-Shop es un ecommerce moderno que ofrece una amplia variedad de productos de moda, incluyendo ropa de mujer, ropa de hombre y accesorios. Disfruta de una experiencia de compra fluida y fácil con nuestra PWA.">
  
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180x180.png">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
  <link rel="stylesheet" href="assets/css/skeleton.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>

<body>
  <header>
    <div class="logo">
      <img src="assets/img/logo-white.png" alt="Logo de Vale-Shop" />
    </div>
    <div class="header-icons">
      <i class="fas fa-search"></i>
      <i class="fas fa-bell"></i>
    </div>
  </header>

  <main>
    <section class="banner">
      <div class="banner-content">
        <h1>Bienvenido a Vale-Shop</h1>
        <p>Tu destino para la mejor moda.</p>
      </div>
    </section>

    <!-- El div del prompt de iOS ha sido eliminado de aquí -->

    <section class="carousel">
      <h2>Productos Destacados</h2>
      <div class="carousel-container">
        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <div class="product-container" id="product-list">
          <!-- Los productos se cargarán dinámicamente -->
        </div>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>
      </div>
    </section>

    <section class="categories">
      <h2>Categorías</h2>
      <div class="category-list">
        <div class="category-item">Ropa de Mujer</div>
        <div class="category-item">Ropa de Hombre</div>
        <div class="category-item">Accesorios</div>
      </div>
    </section>
  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
      </a>
      <a href="#productos" class="nav-item">
        <i class="fas fa-th-large"></i>
        <span>Productos</span>
      </a>
      <a href="pedidos.html" class="nav-item">
        <i class="fas fa-shopping-bag"></i>
        <span>Pedidos</span>
      </a>
      <a href="#favoritos" class="nav-item">
        <i class="fas fa-heart"></i>
        <span>Me gusta</span>
      </a>
    </nav>
  </footer>

  <script src="assets/js/api.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("service-worker.js")
          .then((registration) => {
            console.log("SW registrado:", registration);
          })
          .catch((err) => console.log("Error SW:", err));
      });
    }

    // Se eliminó la lógica de detección de iOS y el evento de carga para el prompt
  </script>

  <script>
    getAllProduct();
    let slideIndex = 0;

    function moveSlide(step) {
      const slides = document.querySelector(".product-container");
      if(!slides.children.length) return;
      const slideWidth = slides.children[0].offsetWidth;
      const containerWidth = document.querySelector(".carousel").offsetWidth;
      const maxIndex = Math.max(0, Math.ceil((slides.children.length * slideWidth - containerWidth) / slideWidth));

      slideIndex = Math.max(0, Math.min(slideIndex + step, maxIndex));
      slides.style.transform = `translateX(-${slideIndex * slideWidth}px)`;
    }
  </script>
</body>

</html>
